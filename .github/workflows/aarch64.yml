name: Test aarch64 specific aspects

on:
  push:

# To enable this to run only on relevant pushes, we could add the
# following:
#    paths:
#    - '.github/workflows/aarch64.yml'
#    - '*/aarch64/*'

jobs:
  macos:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-latest
          - macos-26
    runs-on: ${{matrix.runner}}
    steps:
      - uses: actions/checkout@v6
      - name: Install prerequisites
        run: |
          brew install nasm
      - name: Build and run all tests
        run: |
          mkdir build
          cd build
          ../configure --enable-gpl --samples=../samples --disable-libxcb --disable-xlib --disable-avfoundation --disable-videotoolbox
          make -j$(sysctl -n hw.ncpu)
          make -j$(sysctl -n hw.ncpu) fate-seek-hls
          make -j$(sysctl -n hw.ncpu) run-checkasm
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: build-${{matrix.runner}}
          path: |
            build
          retention-days: 7
