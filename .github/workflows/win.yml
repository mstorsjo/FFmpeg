name: Test on Windows

on:
  push:

jobs:
  msvc:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86
          - x64
          - arm64
    runs-on: ${{startsWith(matrix.arch, 'a') && 'windows-11-arm' || 'windows-latest'}}
    steps:
      - name: Set up the environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.arch}}
      - name: Checkout gas-preprocessor
        if: ${{startsWith(matrix.arch, 'a')}}
        uses: actions/checkout@v4
        with:
          repository: ffmpeg/gas-preprocessor
          ref: e29a3c6ebd85c252372eaedaf2973c6f9e9fdc4e
          path: gas-preprocessor
      - uses: actions/checkout@v4
        with:
          path: ffmpeg
      - uses: msys2/setup-msys2@v2
        with:
          msystem: msys
          path-type: inherit
          install: >-
            make
          pacboy: >-
            nasm:p
      - name: Build and test checkasm
        shell: msys2 {0}
        run: |
          mkdir build
          cd build
          export PATH=$(pwd)/../gas-preprocessor:$PATH
          ../ffmpeg/configure ${{startsWith(matrix.arch, 'a') && '--arch=arm64' || ''}} --target-os=win32 --toolchain=msvc --enable-gpl
          make -j$(nproc) checkasm
          make -j$(nproc) run-checkasm
